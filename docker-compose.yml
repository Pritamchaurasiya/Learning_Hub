version: '3.8'

volumes:
  local_postgres_data: {}
  local_postgres_data_backups: {}
  local_redis_data: {}

services:
  django:
    build:
      context: .
      dockerfile: conductor/Dockerfile
    image: conductor_local_django
    container_name: conductor_backend
    depends_on:
      - postgres
      - redis
    volumes:
      - ./conductor:/app:z
      - ./compose/local/django/start:/start
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: /start
    # For Windows: convert line endings on the fly if needed, or ensure they are LF in repo
    environment:
      - USE_DOCKER=yes
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=conductor
      - POSTGRES_USER=debug_user
      - POSTGRES_PASSWORD=debug_password
      - REDIS_URL=redis://redis:6379/0

  postgres:
    build:
      context: .
      dockerfile: compose/production/postgres/Dockerfile
    image: conductor_production_postgres
    container_name: conductor_postgres
    volumes:
      - local_postgres_data:/var/lib/postgresql/data
      - local_postgres_data_backups:/backups
    env_file:
      - .env
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=conductor
      - POSTGRES_USER=debug_user
      - POSTGRES_PASSWORD=debug_password

  redis:
    image: redis:6-alpine
    container_name: conductor_redis
    volumes:
      - local_redis_data:/data
