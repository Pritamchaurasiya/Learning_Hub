{{- if .Values.worker.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "learning-hub.fullname" . }}-worker
  labels:
    {{- include "learning-hub.labels" . | nindent 4 }}
    component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "learning-hub.selectorLabels" . | nindent 6 }}
      component: worker
  template:
    metadata:
      labels:
        {{- include "learning-hub.selectorLabels" . | nindent 8 }}
        component: worker
    spec:
      serviceAccountName: {{ include "learning-hub.fullname" . }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["celery"]
          args: ["-A", "config", "worker", "-l", "info"]
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: {{ .Values.env.DJANGO_SETTINGS_MODULE }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "learning-hub.fullname" . }}-secrets
                  key: database-url
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379/0"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "learning-hub.fullname" . }}-secrets
                  key: gemini-api-key
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
{{- end }}
