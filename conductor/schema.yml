            schema:
              $ref: '#/components/schemas/VerifyPaymentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyPaymentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyPaymentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
          description: ''
  /api/v1/users/avatar/:
