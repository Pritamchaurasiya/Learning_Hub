  /api/v1/courses/:
    get:
      operationId: api_v1_courses_list
      description: |-
        Course endpoints.

        GET /api/v1/courses/ - List courses
        GET /api/v1/courses/{slug}/ - Course detail
        POST /api/v1/courses/{slug}/enroll/ - Enroll in course
        GET /api/v1/courses/{slug}/reviews/ - Get reviews
        POST /api/v1/courses/{slug}/review/ - Submit review
        GET /api/v1/courses/my-courses/ - User's enrolled courses
        GET /api/v1/courses/featured/ - Featured courses
      parameters:
      - in: query
        name: category
        schema:
          type: string
      - in: query
        name: difficulty
        schema:
          type: string
          enum:
          - advanced
          - beginner
          - intermediate
        description: |-
          * `beginner` - Beginner
          * `intermediate` - Intermediate
          * `advanced` - Advanced
      - in: query
        name: instructor
        schema:
          type: string
          format: uuid
      - in: query
        name: is_free
        schema:
          type: boolean
      - in: query
        name: max_price
        schema:
          type: number
      - in: query
        name: min_price
        schema:
          type: number
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
