        * `reminder` - Reminder
    UserBadge:
      type: object
      properties:
        badge:
          allOf:
          - $ref: '#/components/schemas/Badge'
          readOnly: true
        earned_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - badge
      - earned_at
    UserList:
      type: object
      description: Serializer for listing users (minimal data).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          maxLength: 50
        display_name:
          type: string
          maxLength: 100
        avatar:
          type: string
          format: uri
          nullable: true
        role:
          $ref: '#/components/schemas/RoleEnum'
      required:
      - id
      - username
    UserLoginRequest:
      type: object
      description: Serializer for user login.
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    UserProfile:
      type: object
      description: Serializer for user profile.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        username:
          type: string
          maxLength: 50
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
        display_name:
          type: string
          maxLength: 100
        avatar:
          type: string
          format: uri
          nullable: true
        bio:
          type: string
          maxLength: 500
        phone:
          type: string
          maxLength: 20
        is_verified:
          type: boolean
          readOnly: true
        preferences: {}
        created_at:
          type: string
          format: date-time
          readOnly: true
        last_login_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - created_at
      - email
      - id
      - is_verified
      - last_login_at
      - role
      - username
    UserProfileUpdateRequest:
      type: object
      description: Serializer for updating user profile.
      properties:
        display_name:
          type: string
          maxLength: 100
        bio:
          type: string
          maxLength: 500
        phone:
          type: string
          maxLength: 20
        preferences: {}
    UserRegistrationRequest:
      type: object
      description: Serializer for user registration.
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 255
        username:
          type: string
          minLength: 1
          maxLength: 50
        password:
          type: string
          writeOnly: true
          minLength: 1
        password_confirm:
          type: string
          writeOnly: true
          minLength: 1
        display_name:
          type: string
          maxLength: 100
      required:
      - email
      - password
      - password_confirm
      - username
    UserXP:
      type: object
      properties:
        total_xp:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        level:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        weekly_xp:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
    VerifyPaymentRequest:
      type: object
      properties:
        payment_id:
          type: string
          format: uuid
        gateway_payment_id:
          type: string
          minLength: 1
      required:
      - gateway_payment_id
      - payment_id
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
