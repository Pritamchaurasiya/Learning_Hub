apiVersion: v1
kind: Service
metadata:
  name: learning-hub-service
  labels:
    app: learning-hub
spec:
  selector:
    app: learning-hub
    tier: web
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: learning-hub-internal
  labels:
    app: learning-hub
spec:
  selector:
    app: learning-hub
    tier: web
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
