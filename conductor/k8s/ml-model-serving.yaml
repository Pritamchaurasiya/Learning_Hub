# ML Model Serving Infrastructure
# Production-grade model serving with GPU acceleration and auto-scaling

apiVersion: v1
kind: Namespace
metadata:
  name: ml-inference
  labels:
    name: ml-inference
    purpose: machine-learning
---
# GPU Node Pool Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-serving-config
  namespace: ml-inference
data:
  config.yaml: |
    model_serving:
      default_model_format: "onnx"
      max_batch_size: 32
      max_concurrent_requests: 100
      timeout_ms: 5000
      
    gpu_config:
      enabled: true
      memory_fraction: 0.8
      allow_growth: true
      
    cache_config:
      enabled: true
      ttl_seconds: 3600
      max_size: 1000
      
    monitoring:
      enabled: true
      metrics_port: 9090
      health_check_interval: 30
      
    models:
      text_embedding:
        name: "text-embedding-model"
        version: "v1.0"
        framework: "pytorch"
        gpu_required: true
        memory_gb: 4
        max_batch_size: 64
        
      recommendation:
        name: "recommendation-model"
        version: "v2.1"
        framework: "tensorflow"
        gpu_required: true
        memory_gb: 8
        max_batch_size: 32
        
      adaptive_learning:
        name: "adaptive-learning-model"
        version: "v3.0"
        framework: "pytorch"
        gpu_required: true
        memory_gb: 6
        max_batch_size: 16
---
# ML Model Registry Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-model-registry
  namespace: ml-inference
  labels:
    app: ml-model-registry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-model-registry
  template:
    metadata:
      labels:
        app: ml-model-registry
    spec:
      containers:
      - name: mlflow
        image: python:3.10-slim
        ports:
        - containerPort: 5000
          name: api
        env:
        - name: DATABASE_URL
          value: "postgresql://mlflow:${MLFLOW_DB_PASSWORD}@postgres-service:5432/mlflow"
        - name: MLFLOW_S3_ENDPOINT_URL
          value: "https://s3.amazonaws.com"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: secret-access-key
        command: ["bash", "-c"]
        args:
        - |
          pip install mlflow psycopg2-binary boto3 &&
          mlflow server 
          --host 0.0.0.0 
          --port 5000 
          --backend-store-uri postgresql://mlflow:${MLFLOW_DB_PASSWORD}@postgres-service:5432/mlflow
          --default-artifact-root s3://learning-hub-ml-artifacts/
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
---
# ML Model Registry Service
apiVersion: v1
kind: Service
metadata:
  name: ml-model-registry
  namespace: ml-inference
  labels:
    app: ml-model-registry
spec:
  selector:
    app: ml-model-registry
  ports:
  - name: api
    port: 5000
    targetPort: 5000
  type: ClusterIP
---
# TensorFlow Serving Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tensorflow-serving
  namespace: ml-inference
  labels:
    app: tensorflow-serving
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tensorflow-serving
  template:
    metadata:
      labels:
        app: tensorflow-serving
    spec:
      nodeSelector:
        accelerator: nvidia-tesla-t4
      containers:
      - name: tensorflow-serving
        image: tensorflow/serving:2.13.0-gpu
        ports:
        - containerPort: 8500
          name: grpc
        - containerPort: 8501
          name: rest
        env:
        - name: MODEL_NAME
          value: "recommendation-model"
        - name: MODEL_BASE_PATH
          value: "/models/recommendation"
        command: ["tensorflow_model_server"]
        args:
        - --model_name=recommendation-model
        - --model_base_path=/models/recommendation
        - --rest_api_port=8501
        - --grpc_port=8500
        - --enable_batching=true
        - --batching_parameters_file=/config/batching_params.txt
        - --enable_model_warmup=true
        volumeMounts:
        - name: model-storage
          mountPath: /models
        - name: config-volume
          mountPath: /config
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
            nvidia.com/gpu: 1
          limits:
            memory: "8Gi"
            cpu: "4000m"
            nvidia.com/gpu: 1
        livenessProbe:
          httpGet:
            path: /v1/models/recommendation-model
            port: 8501
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /v1/models/recommendation-model
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: ml-models-pvc
      - name: config-volume
        configMap:
          name: ml-serving-config
---
# TensorFlow Serving Service
apiVersion: v1
kind: Service
metadata:
  name: tensorflow-serving
  namespace: ml-inference
  labels:
    app: tensorflow-serving
spec:
  selector:
    app: tensorflow-serving
  ports:
  - name: grpc
    port: 8500
    targetPort: 8500
  - name: rest
    port: 8501
    targetPort: 8501
  type: ClusterIP
---
# PyTorch Serving Deployment (TorchServe)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pytorch-serving
  namespace: ml-inference
  labels:
    app: pytorch-serving
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pytorch-serving
  template:
    metadata:
      labels:
        app: pytorch-serving
    spec:
      nodeSelector:
        accelerator: nvidia-tesla-t4
      containers:
      - name: torchserve
        image: pytorch/torchserve:0.8.0-gpu
        ports:
        - containerPort: 8080
          name: inference
        - containerPort: 8081
          name: management
        - containerPort: 8082
          name: metrics
        env:
        - name: TS_CONFIG_FILE
          value: "/home/model-server/config/config.properties"
        command: ["torchserve"]
        args:
        - --start
        - --model-store=/models
        - --models=text-embedding=text-embedding.mar:adaptive-learning=adaptive-learning.mar
        - --ts-config=/home/model-server/config/config.properties
        volumeMounts:
        - name: model-storage
          mountPath: /models
        - name: config-volume
          mountPath: /home/model-server/config
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
            nvidia.com/gpu: 1
          limits:
            memory: "8Gi"
            cpu: "4000m"
            nvidia.com/gpu: 1
        livenessProbe:
          httpGet:
            path: /models
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /models
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: ml-models-pvc
      - name: config-volume
        configMap:
          name: torchserve-config
---
# TorchServe Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: torchserve-config
  namespace: ml-inference
data:
  config.properties: |
    inference_address=http://0.0.0.0:8080
    management_address=http://0.0.0.0:8081
    metrics_address=http://0.0.0.0:8082
    number_of_gpu=1
    model_store=/models
    load_models=all
    default_workers_per_model=2
    max_workers_per_model=4
    batch_size=32
    max_batch_delay=50
    response_timeout=120
    model_config_max_size=100 MB
    enable_envvars_config=true
    install_py_dep_per_model=true
---
# PyTorch Serving Service
apiVersion: v1
kind: Service
metadata:
  name: pytorch-serving
  namespace: ml-inference
  labels:
    app: pytorch-serving
spec:
  selector:
    app: pytorch-serving
  ports:
  - name: inference
    port: 8080
    targetPort: 8080
  - name: management
    port: 8081
    targetPort: 8081
  - name: metrics
    port: 8082
    targetPort: 8082
  type: ClusterIP
---
# ML Inference Gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-inference-gateway
  namespace: ml-inference
  labels:
    app: ml-inference-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ml-inference-gateway
  template:
    metadata:
      labels:
        app: ml-inference-gateway
    spec:
      containers:
      - name: gateway
        image: learninghub/ml-inference-gateway:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: TENSORFLOW_SERVING_URL
          value: "http://tensorflow-serving:8501"
        - name: PYTORCH_SERVING_URL
          value: "http://pytorch-serving:8080"
        - name: MODEL_REGISTRY_URL
          value: "http://ml-model-registry:5000"
        - name: REDIS_URL
          value: "redis://redis-service:6379/1"
        - name: PROMETHEUS_GATEWAY_URL
          value: "http://prometheus-pushgateway:9091"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
# ML Inference Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: ml-inference-gateway
  namespace: ml-inference
  labels:
    app: ml-inference-gateway
spec:
  selector:
    app: ml-inference-gateway
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
---
# ML Models Persistent Volume Claim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-models-pvc
  namespace: ml-inference
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 500Gi
  storageClassName: nfs
---
# Horizontal Pod Autoscaler for ML Services
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-inference-gateway-hpa
  namespace: ml-inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-inference-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
---
# KEDA Event-based Autoscaling for ML Inference
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ml-inference-scaler
  namespace: ml-inference
spec:
  scaleTargetRef:
    name: ml-inference-gateway
  pollingInterval: 5
  cooldownPeriod: 30
  minReplicaCount: 3
  maxReplicaCount: 20
  triggers:
  - type: prometheus
    metricType: Utilization
    metadata:
      serverAddress: http://prometheus:9090
      query: sum(rate(ml_inference_requests_total[2m])) by (deployment)
      threshold: '100'
  - type: redis
    metadata:
      address: redis-service:6379
      listName: ml-inference-queue
      listLength: '5'
---
# Network Policy for ML Services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ml-inference-network-policy
  namespace: ml-inference
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: learning-hub
    - namespaceSelector:
        matchLabels:
          name: monitoring
    - podSelector:
        matchLabels:
          app: ml-inference-gateway
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 8500
    - protocol: TCP
      port: 8501
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 8081
    - protocol: TCP
      port: 8082
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: ml-inference-gateway
    - to:
    - podSelector:
        matchLabels:
          app: tensorflow-serving
    - to:
    - podSelector:
        matchLabels:
          app: pytorch-serving
    - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
    - protocol: UDP
      port: 53
