version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: learning_hub_backend:latest
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - 8000
    env_file:
      - .env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://learninghub:secure_password@db:5432/learninghub
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - conductor_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=learninghub
      - POSTGRES_USER=learninghub
      - POSTGRES_PASSWORD=secure_password
    networks:
      - conductor_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learninghub"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - conductor_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  celery_worker:
    build: .
    command: celery -A config worker -l INFO
    volumes:
      - media_volume:/app/media
    env_file:
      - .env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgres://learninghub:secure_password@db:5432/learninghub
    depends_on:
      - web
      - redis
      - db
    networks:
      - conductor_net
    restart: always

  celery_beat:
    build: .
    command: celery -A config beat -l INFO
    env_file:
      - .env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgres://learninghub:secure_password@db:5432/learninghub
    depends_on:
      - web
      - redis
      - db
    networks:
      - conductor_net
    restart: always

networks:
  conductor_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
