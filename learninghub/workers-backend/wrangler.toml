name = "learninghub-api"
main = "src/index.ts"
compatibility_date = "2024-01-15"
node_compat = true

# Environment variables
[vars]
ENVIRONMENT = "development"
JWT_EXPIRES_IN = "7d"

# Production environment
[env.production]
name = "learninghub-api-prod"
vars = { ENVIRONMENT = "production" }

# Secrets (set via wrangler secret put)
# DATABASE_URL - Neon PostgreSQL connection string (required)
# JWT_SECRET - Secret key for JWT signing (required)
# OPENAI_API_KEY - OpenAI API for AI tutor (optional)

# KV Namespaces for caching and rate limiting (optional - uncomment when ready)
# [[kv_namespaces]]
# binding = "LEARNINGHUB_KV"
# id = "your-kv-namespace-id"
# preview_id = "your-preview-kv-namespace-id"

# Rate limiting
[limits]
cpu_ms = 30000  # Increased to 30s for complex operations

# Note: Using Neon PostgreSQL via DATABASE_URL env var
# Not using D1 - all database operations go through @neondatabase/serverless
