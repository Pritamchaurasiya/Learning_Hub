name: learning_hub
description: "LearningHub - A cross-platform, AI-powered learning platform for students, professionals, and instructors."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  bitsdojo_window: ^0.1.6
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.2.0
  dynamic_color: ^1.6.8
  flex_color_scheme: ^7.3.1
  confetti: ^0.7.0

  # State Management - Hybrid (Riverpod + BLoC)
  flutter_riverpod: ^2.4.9
  state_notifier: ^1.0.0
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Functional Programming
  dartz: ^0.10.1
  equatable: ^2.0.5

  # Navigation
  go_router: ^17.0.1

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.0.0
  path_provider: ^2.1.5

  # Network
  dio: ^5.4.0
  connectivity_plus: ^7.0.0

  # Video Player
  video_player: ^2.8.1
  chewie: ^1.7.1

  # Authentication
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.3

  # Charts & Analytics
  fl_chart: ^1.1.1

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.1
  share_plus: ^12.0.1
  image_picker: ^1.0.4
  file_picker: ^10.3.8

  # UI Components
  flutter_rating_bar: ^4.0.1
  percent_indicator: ^4.2.3
  readmore: ^3.0.0

  # Markdown for course content
  flutter_markdown_plus: ^1.0.7

  # Code highlighting for programming courses
  flutter_highlight: ^0.7.0

  # PDF viewer for documents
  syncfusion_flutter_pdfviewer: ^32.1.21

  # WebView for embedded content
  webview_flutter: ^4.4.2

  # QR Code generation
  qr_flutter: ^4.1.0
  local_auth: ^3.0.0
  uuid: ^4.5.2
  pdf: ^3.11.3
  open_filex: ^4.7.0
  flutter_local_notifications: ^19.5.0
  flutter_timezone: ^5.0.1
  permission_handler: ^12.0.1
  timezone: ^0.10.1

  # Real-time & WebSocket
  web_socket_channel: ^2.4.0
  socket_io_client: ^2.0.3

  # Security & Encryption
  encrypt: ^5.0.3
  pointycastle: ^3.7.4

  # Monitoring & Analytics
  sentry_flutter: ^7.14.0
  logger: ^2.0.2

  rxdart: ^0.27.7 # Use a specific version instead of any
  # printing: ^5.14.2
  universal_io: ^2.3.1
  url_strategy: ^0.3.0
  package_info_plus: ^9.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.11.2
  mocktail: ^1.0.4
  mockito: any
  msix: ^3.16.7
flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/.env
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

msix_config:
  display_name: LearningHub
  publisher_display_name: Learning Hub Corporation
  identity_name: com.learninghub.production
  publisher: "CN=LearningHub, O=LearningHub, L=San Francisco, S=California, C=US"
  msix_version: 1.0.0.0
  logo_path: assets/icons/app_icon.png
  capabilities: "internetClient, location, microphone, webcam"
  install_certificate: true
  executable_name: learning_hub.exe
