<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta
      name="description"
      content="LearningHub - The Premium AI-Powered Learning Platform. Master new skills with interactive courses, live classes, and AI tutoring."
    />
    <meta
      name="keywords"
      content="Learning, Courses, AI Tutor, Education, Online Classes, Programming, Flutter, Web Development, Certificates, Live Classes"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://learninghub.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://learninghub.com/" />
    <meta
      property="og:title"
      content="LearningHub - Premium AI-Powered Learning Platform"
    />
    <meta
      property="og:description"
      content="Master new skills with LearningHub. AI-powered tutoring, interactive challenges, and world-class instructors."
    />
    <meta property="og:image" content="icons/Icon-512.png" />
    <meta property="og:site_name" content="LearningHub" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://learninghub.com/" />
    <meta
      property="twitter:title"
      content="LearningHub - Premium AI-Powered Learning Platform"
    />
    <meta
      property="twitter:description"
      content="Master new skills with LearningHub. AI-powered tutoring, interactive challenges, and world-class instructors."
    />
    <meta property="twitter:image" content="icons/Icon-512.png" />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="LearningHub" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Performance & SEO -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <meta
      name="theme-color"
      content="#0066FF"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0B1220"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/Icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="icons/Icon-16.png" />

    <title>LearningHub - AI-Powered Learning Platform</title>
    <link rel="manifest" href="manifest.json" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "LearningHub",
        "description": "AI-Powered Learning Platform with interactive courses, live classes, and personalized AI tutoring.",
        "url": "https://learninghub.com",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Web, Windows, Android, iOS, macOS",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "author": {
          "@type": "Organization",
          "name": "LearningHub",
          "url": "https://learninghub.com"
        }
      }
    </script>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        background-color: #0b1220;
        margin: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Skip to content link for accessibility */
      .skip-link {
        position: absolute;
        top: -100%;
        left: 50%;
        transform: translateX(-50%);
        background: #0066ff;
        color: white;
        padding: 12px 24px;
        border-radius: 0 0 8px 8px;
        z-index: 10000;
        font-weight: 600;
        text-decoration: none;
        transition: top 0.2s;
      }
      .skip-link:focus {
        top: 0;
      }

      .loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
      }

      .logo {
        width: 88px;
        height: 88px;
        background: linear-gradient(135deg, #0066ff, #7c4dff);
        border-radius: 22px;
        box-shadow: 0 12px 36px rgba(0, 102, 255, 0.35),
          0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        animation: pulse 2s infinite ease-in-out;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 42px;
        font-weight: 800;
        letter-spacing: -1px;
      }

      .brand-text {
        color: rgba(255, 255, 255, 0.95);
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.3px;
        margin: 0;
        opacity: 0;
        animation: fadeSlideUp 0.6s ease-out 0.3s forwards;
      }

      .tagline {
        color: rgba(255, 255, 255, 0.5);
        font-size: 14px;
        font-weight: 400;
        margin: -12px 0 0 0;
        opacity: 0;
        animation: fadeSlideUp 0.6s ease-out 0.5s forwards;
      }

      .progress-bar {
        width: 220px;
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        overflow: hidden;
        opacity: 0;
        animation: fadeIn 0.4s ease-out 0.8s forwards;
      }

      .progress-value {
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, #0066ff, #7c4dff);
        transform-origin: left;
        animation: progress 2.5s infinite ease-in-out;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
          box-shadow: 0 12px 36px rgba(0, 102, 255, 0.35);
        }
        50% {
          transform: scale(1.04);
          box-shadow: 0 16px 44px rgba(124, 77, 255, 0.4);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 12px 36px rgba(0, 102, 255, 0.35);
        }
      }

      @keyframes progress {
        0% {
          transform: scaleX(0);
        }
        50% {
          transform: scaleX(0.7);
        }
        100% {
          transform: scaleX(1);
        }
      }

      @keyframes fadeSlideUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      /* Respect reduced motion preferences */
      @media (prefers-reduced-motion: reduce) {
        .logo,
        .progress-value,
        .brand-text,
        .tagline,
        .progress-bar {
          animation: none;
          opacity: 1;
          transform: none;
        }
      }

      /* Light mode support */
      @media (prefers-color-scheme: light) {
        body {
          background-color: #f8fafc;
        }
        .brand-text {
          color: rgba(15, 23, 42, 0.95);
        }
        .tagline {
          color: rgba(15, 23, 42, 0.5);
        }
        .progress-bar {
          background: rgba(0, 0, 0, 0.06);
        }
      }
    </style>
  </head>
  <body>
    <!-- Skip to content for accessibility -->
    <a href="#flutter-app" class="skip-link">Skip to main content</a>

    <div class="loading-container" role="status" aria-label="Loading LearningHub">
      <div class="logo" aria-hidden="true">L</div>
      <p class="brand-text">LearningHub</p>
      <p class="tagline">Learn. Grow. Succeed.</p>
      <div class="progress-bar" aria-hidden="true">
        <div class="progress-value"></div>
      </div>
    </div>

    <!-- Noscript fallback -->
    <noscript>
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          font-family: Inter, sans-serif;
          color: #64748b;
          text-align: center;
          padding: 24px;
        "
      >
        <div>
          <h1 style="color: #0f172a; margin-bottom: 12px">
            LearningHub requires JavaScript
          </h1>
          <p>
            Please enable JavaScript in your browser settings to use
            LearningHub.
          </p>
        </div>
      </div>
    </noscript>

    <div id="flutter-app">
      <script src="flutter_bootstrap.js" async></script>
    </div>
  </body>
</html>
