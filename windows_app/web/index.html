<!DOCTYPE html>
<html>
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta
      name="description"
      content="LearningHub - The Premium AI-Powered Learning Platform. Master new skills with interactive courses, live classes, and AI tutoring."
    />
    <meta
      name="keywords"
      content="Learning, Courses, AI Tutor, Education, Online Classes, Programming, Flutter, Web Development"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://learninghub.com/" />
    <meta
      property="og:title"
      content="LearningHub - Premium Learning Platform"
    />
    <meta
      property="og:description"
      content="Master new skills with LearningHub. AI-powered tutoring, interactive challenges, and world-class instructors."
    />
    <meta property="og:image" content="icons/Icon-512.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://learninghub.com/" />
    <meta
      property="twitter:title"
      content="LearningHub - Premium Learning Platform"
    />
    <meta
      property="twitter:description"
      content="Master new skills with LearningHub. AI-powered tutoring, interactive challenges, and world-class instructors."
    />
    <meta property="twitter:image" content="icons/Icon-512.png" />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="LearningHub" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Performance & SEO -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <meta
      name="theme-color"
      content="#2196F3"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#121212"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>LearningHub</title>
    <link rel="manifest" href="manifest.json" />
    <style>
      body {
        background-color: #121212;
        margin: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Inter", sans-serif;
      }
      .loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      .logo {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #2196f3, #673ab7);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(33, 150, 243, 0.4);
        animation: pulse 2s infinite ease-in-out;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 40px;
        font-weight: bold;
      }
      .progress-bar {
        width: 200px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-value {
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, #2196f3, #673ab7);
        transform-origin: left;
        animation: progress 2s infinite ease-in-out;
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
          box-shadow: 0 10px 30px rgba(33, 150, 243, 0.4);
        }
        50% {
          transform: scale(1.05);
          box-shadow: 0 15px 40px rgba(103, 58, 183, 0.5);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 10px 30px rgba(33, 150, 243, 0.4);
        }
      }
      @keyframes progress {
        0% {
          transform: scaleX(0);
        }
        50% {
          transform: scaleX(0.7);
        }
        100% {
          transform: scaleX(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="loading-container">
      <div class="logo">L</div>
      <div class="progress-bar">
        <div class="progress-value"></div>
      </div>
    </div>
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
