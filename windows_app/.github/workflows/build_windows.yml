name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows MSIX
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Install MSIX Tool
        run: dart pub global activate msix

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Create MSIX
        # Note: In a real CI env, you would inject the Certificate via Secrets
        # For this template, we run the create command which uses the config in pubspec.yaml
        run: dart run msix:create

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: learning-hub-setup
          path: build/windows/x64/runner/Release/learning_hub.msix
          retention-days: 5

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/windows/x64/runner/Release/learning_hub.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
