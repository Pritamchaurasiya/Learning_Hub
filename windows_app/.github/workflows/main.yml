name: God-Tier Windows Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    name: Build & Verify (Windows)
    runs-on: windows-latest

    steps:
      - name: 🛡️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🧹 Clean & Get Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: 🔍 Verify Code Quality (Zero-Warning Policy)
        # We use --no-fatal-infos for now to allow minor style hints, 
        # but for God-Tier this should eventually be --fatal-infos
        run: flutter analyze --no-fatal-infos

      - name: 🧪 Run Tests
        run: flutter test

      - name: 📦 Build Windows Release
        run: flutter build windows --release

      - name: 🧬 Obfuscate Symbols (Simulated)
        # In a real pipeline, we would archive the symbols.
        # This step verifies the symbols directory exists if we used the flag.
        run: |
          # Just creating the dir to simulate artifact collection if needed for future obfuscation steps
          New-Item -ItemType Directory -Force -Path build\app\outputs\symbols

      - name: 📦 Compress Artifacts
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath LearningHub_Windows_Release.zip

      - name: ⬆️ Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: LearningHub_Windows_Release.zip
