name: Conductor Backend CI

on:
  push:
    paths:
      - "conductor/**"
  pull_request:
    paths:
      - "conductor/**"

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./conductor

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: conductor
          POSTGRES_USER: conductor
          POSTGRES_PASSWORD: conductor_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt
          pip install pytest pytest-django factory-boy

      - name: Linting (Black)
        run: python -m black --check .

      - name: Linting (Flake8)
        run: python -m flake8 .

      - name: Static Security Analysis (Bandit)
        run: python -m bandit -r . -c pyproject.toml || true # Fail open for now, adjust config later

      - name: Type Checking (Mypy)
        run: python -m mypy .

      - name: Run Tests
        env:
          SECRET_KEY: testing_secret_key
          DEBUG: "True"
          ALLOWED_HOSTS: localhost
          DATABASE_URL: postgres://conductor:conductor_password@localhost:5432/conductor
          REDIS_URL: redis://localhost:6379/0
        run: |
          python manage.py test
