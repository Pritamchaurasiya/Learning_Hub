
name: Ultimate God Mode CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # 1. Backend Validation
  backend-test:
    name: 🛡️ Django Guard
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        working-directory: ./conductor
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit safety
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🔒 Security Scan (Bandit)
        working-directory: ./conductor
        run: bandit -r . -f custom --msg-template "{abspath}:{line}: {test_id}[bandit]: {msg}"

      - name: 🧪 Run Tests (All Apps)
        working-directory: ./conductor
        env:
          SECRET_KEY: "ci-secret-key-god-mode"
          DEBUG: "True"
          DATABASE_URL: "postgres://test_user:test_password@localhost:5432/test_db"
          REDIS_URL: "redis://localhost:6379/0"
        run: python manage.py test

  # 2. Frontend Validation
  frontend-test:
    name: 📱 Flutter Guard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./my_flutter_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.13.0"
          channel: "stable"
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: 🔍 Static Analysis
        run: flutter analyze

      - name: 🧪 Run Widget Tests
        run: flutter test

  # 3. Docker Build (Runs only if tests pass)
  build-push:
    name: 🐳 Build & Push
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Logic for Build (Simulated)
        run: echo "Building Docker Images... Done."
