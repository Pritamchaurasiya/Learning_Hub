name: Learning Hub CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  backend-test:
    name: Backend Lint & Test (Django)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: conductor/requirements/*.txt

      - name: Install Dependencies
        working-directory: ./conductor
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        working-directory: ./conductor
        run: |
          # Stop on Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings only (non-blocking)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Security Scan (Bandit)
        working-directory: ./conductor
        run: bandit -r . -f screen --severity-level medium || true

      - name: Run Migrations
        working-directory: ./conductor
        run: python manage.py migrate --run-syncdb
        env:
          SECRET_KEY: "ci-test-secret-key-not-for-prod"
          DEBUG: "True"
          DATABASE_URL: "sqlite:///db.sqlite3"
          REDIS_URL: "redis://localhost:6379/0"

      - name: Django System Check
        working-directory: ./conductor
        run: python manage.py check
        env:
          SECRET_KEY: "ci-test-secret-key-not-for-prod"
          DEBUG: "True"
          DATABASE_URL: "sqlite:///db.sqlite3"
          REDIS_URL: "redis://localhost:6379/0"

      - name: Run Tests
        working-directory: ./conductor
        run: python manage.py test --verbosity 2
        env:
          SECRET_KEY: "ci-test-secret-key-not-for-prod"
          DEBUG: "True"
          DATABASE_URL: "sqlite:///db.sqlite3"
          REDIS_URL: "redis://localhost:6379/0"

  # ─── Docker Build (main branch only) ───
  backend-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t learning-hub-backend:${{ github.sha }} ./conductor

  # ─── Frontend (Flutter) ───
  frontend-analyze:
    name: Frontend Analyze & Test (Flutter)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"
          cache: true

      - name: Install Dependencies
        working-directory: ./windows_app
        run: flutter pub get

      - name: Analyze Code
        working-directory: ./windows_app
        run: flutter analyze --no-fatal-infos

      - name: Run Tests
        working-directory: ./windows_app
        run: flutter test --reporter expanded || true
