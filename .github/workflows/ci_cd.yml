name: Learning Hub CI/CD

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: conductor
          POSTGRES_USER: conductor
          POSTGRES_PASSWORD: conductor_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r windows_app/conductor/requirements/base.txt

      - name: Run Migrations
        env:
          SECRET_KEY: test_key
          DEBUG: True
          DATABASE_URL: postgres://conductor:conductor_password@localhost:5432/conductor
          REDIS_URL: redis://localhost:6379/1
        run: |
          cd windows_app/conductor
          python manage.py migrate

      - name: Run Tests
        env:
          SECRET_KEY: test_key
          DEBUG: True
          DATABASE_URL: postgres://conductor:conductor_password@localhost:5432/conductor
          REDIS_URL: redis://localhost:6379/1
        run: |
          cd windows_app/conductor
          python manage.py test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./windows_app/my_flutter_app
    steps:
      - uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.13.0"
          channel: "stable"

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run Tests
        run: flutter test

      - name: Build Web
        run: flutter build web --release --no-tree-shake-icons
